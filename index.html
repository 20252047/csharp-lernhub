<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0f14">
  <title>C# Lernhub — POS1</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="app-logo" href="#" aria-label="C# Lernhub Startseite">C<span>#</span> LERNHUB <span>// POS1</span></a>
      <nav class="tab-bar" aria-label="Hauptnavigation">
        <button class="tab-btn active" data-tab="simulator" type="button">⬡ Simulator</button>
        <button class="tab-btn" data-tab="exercises" type="button">≡ Übungen</button>
        <button class="tab-btn" data-tab="referenz" type="button">📖 Referenz</button>
      </nav>
    </header>

    <main>
      <section id="tab-simulator" class="tab-content active" aria-labelledby="tab-simulator-title">
        <h1 id="tab-simulator-title" class="sr-only">Simulator</h1>
        <div class="sim-layout">
          <aside class="panel" id="panel-control">
            <button class="panel-header" type="button" data-panel="panel-control">
              <span>Steuerung</span><span class="panel-toggle-icon">▾</span>
            </button>
            <div class="panel-body">
              <div class="form-group">
                <label for="sel-struct">Datenstruktur</label>
                <select id="sel-struct"></select>
              </div>
              <div id="struct-info-box" class="struct-info-box"></div>
              <div id="string-edit-box" class="string-input-box" hidden>
                <label for="string-value-input">Aktueller String-Wert</label>
                <input type="text" id="string-value-input" value="Hallo Welt" placeholder="Text eingeben…" autocomplete="off">
              </div>
              <hr class="divider">
              <div class="form-group">
                <label for="sel-method">Methode / Eigenschaft</label>
                <select id="sel-method"><option value="">– wählen –</option></select>
              </div>
              <div id="method-info-box"></div>
              <div id="params-box"></div>
              <button class="btn btn-primary mt12" id="btn-execute" type="button">▶ Methode ausführen</button>
            </div>
          </aside>

          <section class="visual-area panel" aria-label="Visualisierung">
            <div class="vis-toolbar">
              <span id="vis-struct-label" class="vis-struct-name">String</span>
              <span id="vis-count-badge" class="vis-count-badge">0 Elemente</span>
              <span id="vis-last-op" class="vis-last-op"></span>
            </div>
            <div class="vis-canvas"><div id="vis-container"></div></div>
          </section>

          <aside class="panel panel-right output-panel" id="panel-output">
            <button class="panel-header" type="button" data-panel="panel-output">
              <span>Ausgabe & Rückgabewert</span><span class="panel-toggle-icon">▾</span>
            </button>
            <div id="output-log" class="output-log" aria-live="polite">
              <div class="log-empty">Noch keine Ausgabe.<br>Methode ausführen →</div>
            </div>
            <div class="reset-row">
              <button class="btn btn-ghost" id="btn-clear-log" type="button">Log leeren</button>
              <button class="btn btn-danger" id="btn-reset" type="button">↺ Reset</button>
            </div>
          </aside>
        </div>
      </section>

      <section id="tab-exercises" class="tab-content" aria-labelledby="tab-exercises-title">
        <h1 id="tab-exercises-title" class="sr-only">Übungsaufgaben</h1>
        <div class="ex-layout">
          <aside class="ex-sidebar" id="ex-sidebar" aria-label="Aufgabenliste"></aside>
          <article class="ex-detail" id="ex-detail">
            <div class="empty-state">Aufgabe auswählen.</div>
          </article>
        </div>
      </section>

      <section id="tab-referenz" class="tab-content" aria-labelledby="tab-reference-title">
        <h1 id="tab-reference-title" class="sr-only">Referenz</h1>
        <div class="ref-layout">
          <nav class="ref-sidenav" id="ref-sidenav" aria-label="Referenz-Inhalt"></nav>
          <article class="ref-content" id="ref-content">
            <div class="empty-state">Referenz wird geladen.</div>
          </article>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Mobile Navigation">
      <button class="bottom-nav-btn active" data-tab="simulator" type="button"><span class="nav-icon">⬡</span><span>Simulator</span></button>
      <button class="bottom-nav-btn" data-tab="exercises" type="button"><span class="nav-icon">≡</span><span>Übungen</span></button>
      <button class="bottom-nav-btn" data-tab="referenz" type="button"><span class="nav-icon">📖</span><span>Referenz</span></button>
    </nav>
  </div>
</body>
</html>
